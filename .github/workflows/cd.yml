name: CD

# Runs on published GitHub Releases and on version tags (v1.2.3).
# Pipeline: build & push a container image to GHCR -> deploy to Railway
# -> notify Slack/Telegram on success or failure.
#
# Required repository secrets (only needed for the steps you use):
#   RAILWAY_TOKEN     - Railway project token (railway.app -> project -> Settings -> Tokens)
#   RAILWAY_SERVICE   - Railway service name/ID to deploy
#   SLACK_WEBHOOK_URL - Slack Incoming Webhook URL (optional)
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID - Telegram bot notifications (optional)
#
# GHCR push uses the built-in GITHUB_TOKEN, no extra secret needed.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

concurrency:
  group: cd-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  # Re-run the essential checks before shipping. Cheap insurance against
  # a tag being pushed from a broken commit.
  # ---------------------------------------------------------------------
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          REDIS_URL: redis://127.0.0.1:6379
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_KEY: ci-placeholder-service-key
          JWT_SECRET: ci-placeholder-jwt-secret-min-32-chars

  # ---------------------------------------------------------------------
  # Build once, tag with the version + latest, push to GHCR. Downstream
  # jobs (and Railway, if configured to pull from GHCR) reuse this image.
  # ---------------------------------------------------------------------
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # Deploy to Railway. Uses the official Railway CLI; skipped cleanly
  # (not failed) if RAILWAY_TOKEN hasn't been configured yet, so this
  # workflow is safe to merge before Railway is set up.
  # ---------------------------------------------------------------------
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ vars.RAILWAY_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Check Railway credentials
        id: check
        run: |
          if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RAILWAY_TOKEN secret not set — skipping Railway deploy. Add it in repo Settings > Secrets to enable."
          fi

      - name: Setup Node
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Railway CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install -g @railway/cli

      - name: Deploy
        if: steps.check.outputs.configured == 'true'
        run: railway up --service "${{ secrets.RAILWAY_SERVICE }}" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ---------------------------------------------------------------------
  # Notify — reports both success and failure of the release pipeline.
  # ---------------------------------------------------------------------
  notify:
    name: Notify release status
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-railway]
    if: always()
    steps:
      - name: Compute status
        id: status
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ] && [ "${{ needs.deploy-railway.result }}" != "failure" ]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
          else
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack notification
        # NOTE: the `secrets` context cannot be referenced inside `if:` —
        # GitHub rejects that at parse time ("Unrecognized named-value:
        # 'secrets'"). Instead, always run the step and bail out early
        # inside the shell if the secret hasn't been configured.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification."
            exit 0
          fi
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- <<EOF
          {
            "text": "${{ steps.status.outputs.emoji }} *Release ${{ steps.status.outputs.state }}* for \`${{ github.repository }}\` @ \`${{ github.ref_name }}\`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
          }
          EOF

      - name: Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID not set — skipping Telegram notification."
            exit 0
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${{ steps.status.outputs.emoji }} <b>Release ${{ steps.status.outputs.state }}</b> for <code>${{ github.repository }}</code> @ <code>${{ github.ref_name }}</code>%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View run</a>"
